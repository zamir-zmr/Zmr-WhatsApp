window.onload = () => {
    const saved = localStorage.getItem("ash_chat_user");
    
    // Sabse pehle popup aur overlay ko hidden confirm karein
    document.getElementById('error-popup').style.display = "none";

    if (saved) {
        // Agar pehle se login hai, toh seedha chat dikhao

    } else {

        document.getElementById('login-screen').style.display = "flex";

    }
};

function login() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const popup = document.getElementById('error-popup');
    const overlay = document.getElementById('blur-overlay');
    const msgText = document.getElementById('error-message-text');

    // Reset animations
    popup.classList.remove('pop-up-show', 'shake-denied');

    let errorMessage = "";

    if (u === "") {
        errorMessage = "Please enter your Name";
    } else if (p === "") {
        errorMessage = "Please enter your Password";
    } else if (u !== "Zamir" && u !== "Rahima") {
        errorMessage = "Wrong Username!";
    } else if (p !== "123") {
        errorMessage = "Wrong Password! Access Denied.";
    }

    if (errorMessage !== "") {
        msgText.innerText = errorMessage;
        overlay.style.display = 'block';
        
        // Trigger Pop-in animation
        popup.classList.add('pop-up-show');

        // Agar user ya password galat hai, toh shake karein
        if(errorMessage.includes("Wrong")) {
            setTimeout(() => {
                popup.classList.add('shake-denied');
            }, 50);
        }
        return;
    }

    localStorage.setItem("ash_chat_user", u);
    setupChat(u);
}

function closeError() {
    const popup = document.getElementById('error-popup');
    const overlay = document.getElementById('blur-overlay');

    // 1. Animation classes remove karein taaki popup hide ho jaye
    popup.classList.remove('pop-up-show', 'shake-denied');
    
    // 2. Direct display none karein safety ke liye
    popup.style.display = 'none';
    overlay.style.display = 'none';
    
    // 3. Error text saaf karein
    document.getElementById('error-message-text').innerText = "";
}

// --- 1. ONLINE & LAST SEEN SETUP ---
function setupPresence() {
    const userStatusRef = db.ref('status/' + currentUser);
    const connectedRef = db.ref('.info/connected');
    connectedRef.on('value', (snap) => {
        if (snap.val() === true) {
            userStatusRef.onDisconnect().set({
                state: 'offline',
                last_changed: firebase.database.ServerValue.TIMESTAMP
            });
            userStatusRef.set({
                state: 'online',
                last_changed: firebase.database.ServerValue.TIMESTAMP
            });
        }
    });
}



function checkOnlineStatus() {
    let friendName = (currentUser === "Zamir") ? "Rahima" : "Zamir";
    const statusElement = document.getElementById('user-status');

    db.ref('status/' + friendName).on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        if (data.state === 'online') {
            statusElement.innerText = "Online";
            statusElement.style.color = "#00a884"; // Green for Online
        } else {
            // AM/PM Logic for Last Seen
            const date = new Date(data.last_changed);
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            const timeStr = hours + ':' + minutes + ' ' + ampm;
            
            statusElement.innerText = "last seen today at " + timeStr;
            statusElement.style.color = "#667781"; // Grey for Last Seen
        }
    });
}



function setupChat(user) {
    currentUser = user;
    const talkingTo = (user === "Zamir") ? "Rahima" : "Zamir";
    
    document.getElementById('login-screen').style.display = "none";
    document.getElementById('chat-interface').style.display = "flex";
    document.getElementById('display-name').innerText = talkingTo;
    document.getElementById('user-initial').innerText = talkingTo.charAt(0);

    // Initial presence setup
    setupPresence(user);

    // --- 2. Monitor Friend's Status & Typing ---
    const statusElement = document.getElementById('user-status');
    let friendCurrentStatus = 'offline';

    // Friend ka status listen karein
    db.ref('status/' + talkingTo).on('value', (snapshot) => {
        friendCurrentStatus = snapshot.val();
        renderStatus(false); 
    });

    // Typing listener jo status ko override karega
    db.ref('typing/' + talkingTo).on('value', (snapshot) => {
        const isTyping = snapshot.val();
        renderStatus(isTyping);
    });

    function renderStatus(typing) {
        if (typing) {
            statusElement.innerText = "typing...";
            statusElement.className = "status-text typing-indicator";
        } else if (friendCurrentStatus === 'online') {
            statusElement.innerText = "Online";
            statusElement.className = "status-text online";
        } else if (friendCurrentStatus) {
            const date = new Date(friendCurrentStatus);
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            statusElement.innerText = "last seen today at " + timeStr;
            statusElement.className = "status-text offline";
        } else {
            statusElement.innerText = "Offline";
            statusElement.className = "status-text offline";
        }
    }

    loadMessages();
    requestNotificationPermission();
}


function logout() {
    if (currentUser) {
        // Logout se pehle current time ko last seen set karein
        db.ref('status/' + currentUser).set(Date.now()).then(() => {
            db.ref('typing/' + currentUser).set(false);
            localStorage.removeItem("ash_chat_user");
            location.reload();
        });
    }
}

let holdTimer;
let isSelectionMode = false;
let selectedMessages = []; // Multi-select ke liye IDs yahan store hongi
let currentMsgToDelete = null;

function loadMessages() {
    const list = document.getElementById('message-list');
    
    // 1. BLUE TICK UPDATER (Jab status change ho, icon color badle)
    db.ref('messages').on('child_changed', (snapshot) => {
        const data = snapshot.val();
        const iconElement = document.getElementById("tick-" + snapshot.key);
        if (iconElement && data.status === "read") {
            iconElement.className = "fa-solid fa-check-double read-tick";
        }
    });

    // 2. MESSAGE LOADER & SELECTION LOGIC
    db.ref('messages').on('child_added', (snapshot) => {
        const data = snapshot.val();
        const msgId = snapshot.key;
        const isMe = data.sender === currentUser;

        // Auto-read logic
        if (!isMe && data.status !== "read" && document.visibilityState === 'visible') {
            db.ref('messages/' + msgId).update({ status: "read" });
        }

        const bubble = document.createElement('div');
        bubble.id = "msg-" + msgId;
        bubble.className = `msg-bubble ${isMe ? 'sent' : 'received'}`;
        
        // --- SELECTION LOGIC START ---
        // Click logic: Agar selection mode ON hai toh click karne par select/unselect hoga
        bubble.onclick = () => {
            if (isSelectionMode) toggleMessageSelection(msgId);
        };

        // Hold logic: Sirf apne message par hold karne se mode start hoga
        if (isMe) {
            bubble.onmousedown = () => startHold(msgId);
            bubble.onmouseup = () => clearHold();
            bubble.ontouchstart = () => startHold(msgId); 
            bubble.ontouchend = () => clearHold();
        }
        // --- SELECTION LOGIC END ---

        let tickClass = (data.status === "read") ? "read-tick" : "unread-tick";
        let statusHTML = isMe ? `<span class="status-icon">
            <i id="tick-${msgId}" class="fa-solid fa-check-double ${tickClass}"></i>
        </span>` : "";

        bubble.innerHTML = `
            <div class="msg-content">${data.text}</div>
            <div class="bubble-footer">
                <span class="msg-time">${data.time}</span>
                ${statusHTML}
            </div>
        `;
        
        list.appendChild(bubble);
        list.scrollTop = list.scrollHeight; 
    });

    // 3. DELETE LISTENER (Jab Firebase se delete ho toh screen se hat jaye)
    db.ref('messages').on('child_removed', (snapshot) => {
        const element = document.getElementById("msg-" + snapshot.key);
        if (element) element.remove();
    });

    // 4. Presence & Typing Start
    setupTypingListener();
    setupPresence();
}

function handleTyping() {
    db.ref('typing/' + currentUser).set(true);
    clearTimeout(window.typingTimer);
    window.typingTimer = setTimeout(() => {
        db.ref('typing/' + currentUser).set(false);
    }, 1500); 
}


function setupTypingListener() {
    db.ref('typing').on('value', (snapshot) => {
        const typingData = snapshot.val() || {};
        const statusElement = document.getElementById('user-status');
        let friendName = (currentUser === "Zamir") ? "Rahima" : "Zamir";

        if (typingData[friendName] === true) {
            statusElement.innerText = "typing...";
            statusElement.style.color = "#ea4335"; // Red for Typing
        } else {
            // Typing khatam hone par wapas Online/Last Seen check karein
            checkOnlineStatus();
        }
    });
}



// 3. SEND MESSAGE UPDATED (Message bhejte hi typing stop)

// --- 3. SEND MESSAGE (With Typing Stop) ---

// --- 3. SEND MESSAGE (AM/PM + Typing Stop) ---
function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (text === "") return;

    // AM/PM Time Logic
    const now = new Date();
    let hours = now.getHours();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    let minutes = now.getMinutes().toString().padStart(2, '0');
    const timeStr = `${hours}:${minutes} ${ampm}`;

    db.ref('messages').push({
        sender: currentUser,
        text: text,
        time: timeStr,
        status: "sent" // Default status
    });

    input.value = "";
    db.ref('typing/' + currentUser).set(false);
    clearTimeout(window.typingTimer);
    document.getElementById('message-list').scrollTop = document.getElementById('message-list').scrollHeight;
}

// --- Selection Logic Functions ---

function startHold(id) {
    if (isSelectionMode) return; // Mode on hai toh timer nahi chalega
    
    if (navigator.vibrate) navigator.vibrate(40);
    holdTimer = setTimeout(() => {
        enterSelectionMode(id);
    }, 800); 
}

function clearHold() {
    clearTimeout(holdTimer);
}

function enterSelectionMode(id) {
    isSelectionMode = true;
    document.getElementById('selection-bar').style.display = 'flex';
    toggleMessageSelection(id);
}

function toggleMessageSelection(id) {
    const el = document.getElementById("msg-" + id);
    const index = selectedMessages.indexOf(id);

    if (index > -1) {
        selectedMessages.splice(index, 1);
        el.classList.remove('selected');
    } else {
        selectedMessages.push(id);
        el.classList.add('selected');
    }

    document.getElementById('select-count').innerText = selectedMessages.length;
    if (selectedMessages.length === 0) exitSelectionMode();
}

function exitSelectionMode() {
    isSelectionMode = false;
    selectedMessages.forEach(id => {
        const el = document.getElementById("msg-" + id);
        if (el) el.classList.remove('selected');
    });
    selectedMessages = [];
    document.getElementById('selection-bar').style.display = 'none';
}

function deleteSelectedMessages() {
    if (confirm(`Delete ${selectedMessages.length} messages for everyone?`)) {
        selectedMessages.forEach(id => {
            db.ref('messages/' + id).remove();
        });
        exitSelectionMode();
    }
}

function openDeleteModal(id) {
    currentMsgToDelete = id;
    const overlay = document.getElementById('delete-overlay');
    const modal = document.getElementById('delete-modal');
    const modalText = document.getElementById('delete-modal-text');

    // Agar multi-select hai toh text badal jaye
    if (isSelectionMode && selectedMessages.length > 1) {
        modalText.innerText = `Delete ${selectedMessages.length} messages for everyone in this chat?`;
    } else {
        modalText.innerText = "This message will be deleted for everyone in this chat.";
    }

    overlay.style.display = 'block';
    modal.style.display = 'block';
    
    // Final delete button ka kaam
    document.getElementById('final-delete-btn').onclick = function() {
        if (isSelectionMode && selectedMessages.length > 0) {
            // Multi-delete logic
            selectedMessages.forEach(msgId => {
                db.ref('messages/' + msgId).remove();
            });
            exitSelectionMode();
        } else if (currentMsgToDelete) {
            // Single delete logic
            db.ref('messages/' + currentMsgToDelete).remove();
        }
        closeDeleteModal();
    };
}

function closeDeleteModal() {
    document.getElementById('delete-overlay').style.display = 'none';
    document.getElementById('delete-modal').style.display = 'none';
    currentMsgToDelete = null;
}

function deleteSelectedMessages() {
    if (selectedMessages.length > 0) {

    }
}
